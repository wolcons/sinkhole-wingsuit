<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sinkhole v0.3</title>
<style>
body{margin:0;overflow:hidden;background:#87ceeb;font-family:Arial}
#hud{position:fixed;left:10px;top:10px;color:white;background:rgba(0,0,0,.45);padding:10px;border-radius:10px;z-index:10}
button{font-size:18px}
</style>
</head>
<body>
<div id="hud">
<b>SINKHOLE v0.3</b><br>
<div id="msg">Fly toward the giant sinkhole</div>
<div id="alt">Altitude: 1200m</div>
<button id="tilt">Enable Tilt</button>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,20000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1.4));
const sun=new THREE.DirectionalLight(0xffffff,2);
sun.position.set(500,1000,500);
scene.add(sun);

// ground
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(12000,12000),
 new THREE.MeshLambertMaterial({color:0x2f7d32})
);
ground.rotation.x=-Math.PI/2;
ground.position.y=-200;
scene.add(ground);

// mountains
for(let i=0;i<40;i++){
 const m=new THREE.Mesh(
  new THREE.ConeGeometry(200+Math.random()*300,300+Math.random()*600,6),
  new THREE.MeshLambertMaterial({color:0x556b2f})
 );
 const a=Math.random()*Math.PI*2;
 const r=2500+Math.random()*2500;
 m.position.set(Math.cos(a)*r,0,Math.sin(a)*r-2500);
 scene.add(m);
}

// giant sinkhole
const rim=new THREE.Mesh(
 new THREE.CylinderGeometry(1400,2200,900,64,1,true),
 new THREE.MeshLambertMaterial({color:0x777777,side:THREE.DoubleSide})
);
rim.position.set(0,-650,-2200);
scene.add(rim);

// hidden basin
const hidden=new THREE.Mesh(
 new THREE.CylinderGeometry(800,1200,700,48,1,true),
 new THREE.MeshLambertMaterial({color:0x666666,side:THREE.DoubleSide})
);
hidden.position.set(900,-1200,-3200);
scene.add(hidden);

// landing beacon
const beacon=new THREE.Mesh(
 new THREE.CylinderGeometry(20,20,2500,12),
 new THREE.MeshBasicMaterial({color:0xff0000})
);
beacon.position.set(900,700,-3200);
scene.add(beacon);

// player
const player=new THREE.Group();
const body=new THREE.Mesh(
 new THREE.BoxGeometry(20,6,40),
 new THREE.MeshLambertMaterial({color:0xff6600})
);
const wings=new THREE.Mesh(
 new THREE.BoxGeometry(70,2,14),
 new THREE.MeshLambertMaterial({color:0xaa3300})
);
player.add(body); player.add(wings);
player.position.set(0,1000,800);
scene.add(player);

let yaw=0, roll=0, pitch=0, speed=25;
let gamma=0,beta=0;

document.getElementById('tilt').onclick=async()=>{
 if(DeviceOrientationEvent && DeviceOrientationEvent.requestPermission){
  try{ await DeviceOrientationEvent.requestPermission(); }catch(e){}
 }
};

window.addEventListener('deviceorientation',e=>{
 gamma=e.gamma||0;
 beta=e.beta||0;
});

function loop(){
 requestAnimationFrame(loop);

 roll += (gamma/45)*0.003;
 pitch += ((beta-45)/45)*0.001;

 roll*=0.96;
 pitch*=0.96;

 yaw += -roll*0.04;

 player.rotation.z=roll*3;
 player.rotation.x=pitch;

 speed=25+(-pitch*15);

 player.position.x += Math.sin(yaw)*speed;
 player.position.z -= Math.cos(yaw)*speed;
 player.position.y -= 1.5 + speed*0.08 - pitch*3;

 camera.position.lerp(
  new THREE.Vector3(
   player.position.x - Math.sin(yaw)*180,
   player.position.y + 70,
   player.position.z + Math.cos(yaw)*180
  ),0.08);

 camera.lookAt(
  player.position.x,
  player.position.y,
  player.position.z-150
 );

 document.getElementById('alt').innerText =
   "Altitude: "+Math.max(0,Math.round(player.position.y+200))+"m";

 renderer.render(scene,camera);
}
loop();

addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
